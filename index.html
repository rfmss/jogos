  -webkit-transition:-webkit-transform 0.13s; transition:transform 0.13s;
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
}
.brc-c { position:absolute; font-size:22px; line-height:1; }
.brc-tl { top:4px; left:5px; }
.brc-br { bottom:4px; right:5px; -webkit-transform:rotate(180deg); transform:rotate(180deg); }
.brc-suit-c { position:absolute; top:50%; left:50%; -webkit-transform:translate(-50%,-50%); transform:translate(-50%,-50%); line-height:0; }
.brc-suit-c svg { width:34px; height:34px; display:block; }
.brc-card.red { color:#d40000; }
.brc-card.wild { color:#6d28d9; background:#f5f0ff; }
.brc-card.selected { border-color:#1a1a1a; border-width:3px; -webkit-transform:translateY(-14px); transform:translateY(-14px); }
.brc-card.sm { width:38px; height:52px; border-radius:6px; cursor:default; touch-action:auto; }
.brc-card.sm .brc-c { font-size:12px; }
.brc-card.sm .brc-suit-c svg { width:18px; height:18px; }
.brc-card.sm .brc-br { display:none; }
.brc-card.dc { width:72px; height:100px; border-radius:10px; }
.brc-card.dc .brc-c { font-size:22px; }
.brc-card.dc .brc-suit-c svg { width:38px; height:38px; }
.brc-card.novo { -webkit-animation:brcDraw 0.48s ease; animation:brcDraw 0.48s ease; }
.brc-card.dragging { opacity:0.25; }
.brc-meld {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-orient:horizontal; -webkit-flex-direction:row; flex-direction:row;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;

}

.brc-meld-tag {

  -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
}
#brc-ghost {
  position:fixed; pointer-events:none; z-index:9995;
  border-radius:6px; background:#f4ede4; border:2.5px solid #2a2a2a;

}
#brc-drop-cursor {

}

/* ══ Tutorial overlay ══ */
#brc-tutorial {

<script>
var DB = 'https://rfmss-games-default-rtdb.firebaseio.com';
var STUN_CFG = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
]};

// ── State ─────────────────────────────────────────────────────────
var sala = null;

var pc = null;            // RTCPeerConnection
var localStream = null;
var muted = false;
var webrtcAtivo = false;

// ── Sound effects (Web Audio API) ─────────────────────────────────
var _sfxCtx = null;
var _sfxOn = localStorage.getItem('sfx') !== '0';
var _sfxLastTurno = null;

function _sfxInit() {
  if (_sfxCtx) return _sfxCtx;
  try { _sfxCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  return _sfxCtx;
}

function snd(name) {
  if (!_sfxOn) return;
  var ctx = _sfxInit();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch(e) {} }
  var t = ctx.currentTime;

  function tone(f1, f2, vol, dur, delay) {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = 'sine';
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(f1, t + delay);
    if (f2 !== f1) o.frequency.exponentialRampToValueAtTime(f2, t + delay + dur * 0.75);
    g.gain.setValueAtTime(0, t + delay);
    g.gain.linearRampToValueAtTime(vol, t + delay + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + delay + dur);
    o.start(t + delay); o.stop(t + delay + dur + 0.01);
  }

  if (name === 'tap')     { tone(900, 680, 0.13, 0.08, 0); }
  if (name === 'draw')    { tone(320, 780, 0.09, 0.16, 0); tone(640, 420, 0.05, 0.12, 0.04); }
  if (name === 'discard') { tone(460, 230, 0.12, 0.15, 0); }
  if (name === 'meld')    { tone(523, 523, 0.11, 0.42, 0); tone(659, 659, 0.11, 0.38, 0.07); tone(784, 784, 0.12, 0.35, 0.14); }
  if (name === 'turn')    { tone(660, 660, 0.11, 0.22, 0); tone(880, 880, 0.12, 0.22, 0.14); }
  if (name === 'win')     { tone(523, 523, 0.10, 0.45, 0); tone(659, 659, 0.10, 0.42, 0.10); tone(784, 784, 0.10, 0.40, 0.20); tone(1047,1047,0.12, 0.55, 0.32); }
  if (name === 'lose')    { tone(440, 220, 0.11, 0.55, 0); }
  if (name === 'reorder') { tone(700, 560, 0.06, 0.07, 0); }
}

// ── XHR helpers ──────────────────────────────────────────────────
function dbGet(path, cb) {
  var x = new XMLHttpRequest();
  x.open('GET', DB + '/salas/' + path + '.json', true);
  x.onload = function() { try { cb(JSON.parse(x.responseText)); } catch(e) { cb(null); } };
  x.onerror = function() { cb(null); };
  x.send();
}
function dbPut(path, data, cb) {
  var x = new XMLHttpRequest();
  x.open('PUT', DB + '/salas/' + path + '.json', true);
  x.setRequestHeader('Content-Type', 'application/json');
  x.onload = function() { if (cb) cb(); };
  x.onerror = function() { if (cb) cb(); };
  x.send(JSON.stringify(data));
}
function dbPatch(path, data, cb) {
  var x = new XMLHttpRequest();
  x.open('PATCH', DB + '/salas/' + path + '.json', true);
  x.setRequestHeader('Content-Type', 'application/json');
  x.onload = function() { if (cb) cb(); };
  x.onerror = function() { if (cb) cb(); };
  x.send(JSON.stringify(data));
}

function gerarCodigo() {
  var code = '';
  for (var i = 0; i < 2; i++) { code += Math.floor(Math.random() * 10); }
  return code;
}

function salvarSessao() {
  localStorage.setItem('j_sala', sala);
  localStorage.setItem('j_papel', papel);
}

function limparSessao() {
  localStorage.removeItem('j_sala');
  localStorage.removeItem('j_papel');
}

function sairSala() {
  var s = sala;
  limparSessao();
  if (waitingTimer) { clearInterval(waitingTimer); waitingTimer = null; }
  if (menuPollTimer) { clearInterval(menuPollTimer); menuPollTimer = null; }
  if (rpsPollingTimer) { clearInterval(rpsPollingTimer); rpsPollingTimer = null; }
  if (dadosPollingTimer) { clearInterval(dadosPollingTimer); dadosPollingTimer = null; }
  if (brcPollTimer) { clearInterval(brcPollTimer); brcPollTimer = null; }
  sala = null; papel = null;
  if (s) dbPatch(s, { estado: 'encerrada' });
  mostrarTela('screen-lobby');
}

function restoreSession() {
  var s = localStorage.getItem('j_sala');
  var p = localStorage.getItem('j_papel');
  if (!s || !p) return;
  dbGet(s + '/estado', function(estado) {
    if (!estado) { limparSessao(); return; }
    if (estado === 'aguardando' && p === 'b') { limparSessao(); return; }
    sala = s; papel = p;
    if (estado === 'aguardando' && p === 'a') {
      document.getElementById('waiting-code').innerHTML = sala;
      mostrarTela('screen-waiting');
      startDots('dots');
      setupMic(function(ok) {
        if (ok) setMicStatus('microfone pronto'); else setMicStatus('sem microfone');
        aguardarJogadorB();
      });
    } else if (estado === 'jogando') {
      mostrarTela('screen-menu');
      document.getElementById('menu-sala-badge').innerHTML = sala;
      startMenuPolling();
      setupMic(function(ok) {
        if (ok) initWebRTC(p === 'a'); else document.getElementById('btn-mute').className = 'mute-fab';
      });
    }
  });
}

var jogoAtivoAnterior = null;
function startMenuPolling() {
  menuPollTimer = setInterval(function() {
    if (!sala) return;
    dbGet(sala + '/estado', function(estado) {
      if (!estado || estado === 'encerrada') { sairSala(); return; }
    });
    dbGet(sala + '/jogoAtivo', function(jogo) {

      jogoAtivoAnterior = jogo;
      if (!jogo || jogo === 'null') {

      } else if (jogo) {
        mostrarTela('screen-sala');

        iniciarJogo();
      }

  }, 1200);
}

function syncMicStatus(targetId) {
  var els = ['mic-status-w','mic-status-m','mic-status-s'];
  var msg = document.getElementById(els[0]).innerHTML ||
            document.getElementById(els[1]).innerHTML ||
            document.getElementById(els[2]).innerHTML;
  for (var i = 0; i < els.length; i++) {
    var el = document.getElementById(els[i]);
    if (el && el.innerHTML) { msg = el.innerHTML; break; }
  }
  var t = document.getElementById(targetId);
  if (t && msg) t.innerHTML = msg;
}

// MICROPHONE + WebRTC
// ═══════════════════════════════════════════════════════════════════
function setupMic(cb) {
  var api = navigator.mediaDevices && navigator.mediaDevices.getUserMedia
    ? function(ok, err) { navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(ok).catch(err); }
    : (navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia)
      ? function(ok, err) { (navigator.getUserMedia||navigator.webkitGetUserMedia||navigator.mozGetUserMedia).call(navigator,{audio:true,video:false},ok,err); }
      : null;
  if (!api) { setMicStatus('sem suporte ao mic'); cb(false); return; }
  api(function(stream) { localStream = stream; cb(true); },
      function() { setMicStatus('microfone negado'); cb(false); });
}

function setMicStatus(msg) {
  var els = ['mic-status-w','mic-status-s'];
  for (var i = 0; i < els.length; i++) {
    var el = document.getElementById(els[i]);
    if (el) el.innerHTML = msg;
  }
}

function initWebRTC(isHost) {
  if (!window.RTCPeerConnection) { setMicStatus('voz indisponível'); return; }
  pc = new RTCPeerConnection(STUN_CFG);

  if (localStream) {
    var tracks = localStream.getTracks();
    for (var i = 0; i < tracks.length; i++) { pc.addTrack(tracks[i], localStream); }
  }

  pc.ontrack = function(e) {
    var audio = document.getElementById('remote-audio');
    if (e.streams && e.streams[0]) { audio.srcObject = e.streams[0]; }
  };

  pc.onicecandidate = function(e) {
    if (!e.candidate) return;
    iceBuffer.push(e.candidate.toJSON());
    var iceKey = papel === 'a' ? 'iceA' : 'iceB';
    var data = {};
    for (var i = 0; i < iceBuffer.length; i++) { data[i] = iceBuffer[i]; }
    dbPut(sala + '/signal/' + iceKey, data);
  };

  pc.onconnectionstatechange = function() {
    var s = pc.connectionState;
    if (s === 'connected') { setMicStatus('voz conectada'); webrtcAtivo = true; }
    else if (s === 'connecting') setMicStatus('conectando voz...');
    else if (s === 'failed' || s === 'disconnected') setMicStatus('voz desconectada');
  };

  if (isHost) {
    pc.createOffer({offerToReceiveAudio:true}).then(function(offer) {
      return pc.setLocalDescription(offer);
    }).then(function() {
      dbPut(sala + '/signal/offer', {type:pc.localDescription.type, sdp:pc.localDescription.sdp});
      setMicStatus('aguardando voz...');
      esperarAnswer();
    });
  } else {
    dbGet(sala + '/signal/offer', function(offer) {
      if (!offer) { setMicStatus('erro: sem offer'); return; }
      pc.setRemoteDescription(new RTCSessionDescription(offer)).then(function() {
        return pc.createAnswer();
      }).then(function(ans) {
        return pc.setLocalDescription(ans);
      }).then(function() {
        dbPut(sala + '/signal/answer', {type:pc.localDescription.type, sdp:pc.localDescription.sdp});
        setMicStatus('conectando voz...');
      });
    });
  }
  startIcePolling();
  document.getElementById('btn-mute').className = 'mute-fab';
}

function esperarAnswer() {
  var tries = 0;
  var t = setInterval(function() {
    if (++tries > 120 || !pc || pc.remoteDescription) { clearInterval(t); return; }
    dbGet(sala + '/signal/answer', function(ans) {
      if (!ans || !pc || pc.remoteDescription) return;
      clearInterval(t);
      pc.setRemoteDescription(new RTCSessionDescription(ans)).catch(function(){});
    });
  }, 1000);
}

function startIcePolling() {
  var remoteKey = papel === 'a' ? 'iceB' : 'iceA';
  setInterval(function() {
    if (!pc || pc.signalingState === 'closed') return;
    dbGet(sala + '/signal/' + remoteKey, function(candidates) {
      if (!candidates) return;
      var keys = Object.keys(candidates);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        if (!iceAplicados[k]) {
          iceAplicados[k] = true;
          try { pc.addIceCandidate(new RTCIceCandidate(candidates[k])).catch(function(){}); } catch(e) {}
        }
      }
    });
  }, 1200);
}

// ── Mute toggle ───────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  if (localStream) {
    var tracks = localStream.getAudioTracks();
    for (var i = 0; i < tracks.length; i++) { tracks[i].enabled = !muted; }
  }
  document.getElementById('icon-mic').style.display     = muted ? 'none' : '';
  document.getElementById('icon-mic-off').style.display = muted ? ''     : 'none';
  document.getElementById('btn-mute').className = muted ? 'mute-fab muted' : 'mute-fab';
  toast(muted ? 'microfone mutado' : 'microfone ativo');
}

// ═══════════════════════════════════════════════════════════════════
function criarSala() {
  sala = gerarCodigo();
  papel = 'a';
  salvarSessao();
  document.getElementById('waiting-code').innerHTML = sala;
  var ci = document.getElementById('waiting-code-inline');
  if (ci) ci.innerHTML = sala;
  var su = document.getElementById('waiting-share-url');
  if (su) su.value = window.location.href.split('?')[0] + '?sala=' + sala;
  mostrarTela('screen-waiting');
  startDots('dots');

  dbPut(sala, { criado: Date.now(), estado: 'aguardando', jogoAtivo: null, rps: { escolhaA: null, escolhaB: null } });

  setupMic(function(ok) {
    if (ok) setMicStatus('microfone pronto');
    else setMicStatus('sem microfone');
    aguardarJogadorB();
  });
}

function entrarSala() {
  var code = document.getElementById('inp-code').value.trim();
  if (!/^\d{2}$/.test(code)) { toast('código tem 2 números'); return; }
  sala = code;
  papel = 'b';

  dbGet(sala + '/estado', function(estado) {
    if (!estado) { toast('sala não encontrada'); sala = null; papel = null; return; }
    if (estado === 'jogando') { toast('sala já em jogo'); sala = null; papel = null; return; }

    salvarSessao();
    dbPatch(sala, { estado: 'jogando', jogoAtivo: null });
    mostrarTela('screen-menu');
    document.getElementById('menu-sala-badge').innerHTML = sala;
    startMenuPolling();

    setupMic(function(ok) {
      if (ok) { initWebRTC(false); }
      else { document.getElementById('btn-mute').className = 'mute-fab'; }
    });
  });
}

function aguardarJogadorB() {
  var tries = 0;
  waitingTimer = setInterval(function() {
    if (++tries > 300) { clearInterval(waitingTimer); limparSessao(); toast('tempo esgotado'); mostrarTela('screen-lobby'); return; }
    dbGet(sala + '/estado', function(estado) {
      if (!estado || estado === 'encerrada') {
        clearInterval(waitingTimer);
        limparSessao(); sala = null; papel = null;
        toast('sala encerrada'); mostrarTela('screen-lobby'); return;
      }
      if (estado === 'jogando') {
        clearInterval(waitingTimer);
        stopDots();
        mostrarTela('screen-menu');
        document.getElementById('menu-sala-badge').innerHTML = sala;
        startMenuPolling();
        initWebRTC(true);
      }
    });
  }, 1500);
}

function iniciarJogo() {
  document.getElementById('jogo-rps').className    = jogoAtivoAnterior === 'rps'    ? 'rps-wrap'  : 'rps-wrap hidden';
  document.getElementById('jogo-dados').className  = jogoAtivoAnterior === 'dados'  ? 'rps-wrap'  : 'rps-wrap hidden';
  document.getElementById('jogo-buraco').className = jogoAtivoAnterior === 'buraco' ? 'brc-outer' : 'brc-outer hidden';
  if (jogoAtivoAnterior === 'rps')    iniciarRPS();
  if (jogoAtivoAnterior === 'dados')  iniciarDados();
  if (jogoAtivoAnterior === 'buraco') iniciarBuraco();
}

// ═══════════════════════════════════════════════════════════════════
// PEDRA PAPEL TESOURA
// ═══════════════════════════════════════════════════════════════════
var EMOJI = { pedra: '🪨', papel: '📄', tesoura: '✂️' };
var NOMES = { pedra: 'pedra', papel: 'papel', tesoura: 'tesoura' };

function iniciarRPS() {
  rpsEscolha = null;
  rpsRevelado = false;
  renderRPS();
  if (rpsPollingTimer) clearInterval(rpsPollingTimer);
  rpsPollingTimer = setInterval(pollRPS, 1200);
}

function rpsEscolher(opcao) {
  if (rpsEscolha || rpsRevelado) return;
  rpsEscolha = opcao;

  var chave = papel === 'a' ? 'escolhaA' : 'escolhaB';
  var patch = {};
  patch[chave] = opcao;
  dbPatch(sala + '/rps', patch);

  renderRPS();
  document.getElementById('rps-waiting').innerHTML = 'aguardando oponente...';
}

function pollRPS() {
  dbGet(sala + '/rps', function(data) {
    if (!data) return;
    var ea = data.escolhaA || null;
    var eb = data.escolhaB || null;
    if (ea && eb && !rpsRevelado) {
      rpsRevelado = true;
      revelarRPS(ea, eb);
    }
  });
}

function revelarRPS(ea, eb) {
  var minhaEscolha = papel === 'a' ? ea : eb;
  var opEscolha    = papel === 'a' ? eb : ea;

  var venc = rpsVencedor(ea, eb);
  var ganhei = (papel === 'a' && venc === 'a') || (papel === 'b' && venc === 'b');
  var empate = venc === 'empate';

  if (ganhei) { scoreEu++; }
  else if (!empate) { scoreOp++; }

  document.getElementById('score-eu').innerHTML = scoreEu;
  document.getElementById('score-op').innerHTML = scoreOp;

  var resultEl = document.getElementById('rps-result');
  var resultText = document.getElementById('rps-result-text');
  var choicesEl = document.getElementById('rps-choices-display');

  resultEl.className = 'rps-result';
  resultText.innerHTML = empate ? 'empate!' : (ganhei ? 'você ganhou!' : 'você perdeu!');
  choicesEl.innerHTML = 'você: ' + EMOJI[minhaEscolha] + '  oponente: ' + EMOJI[opEscolha];

  document.getElementById('rps-waiting').innerHTML = '';
  document.getElementById('btn-nova-rodada').className = 'nova-rodada-btn';

  var btns = ['btn-pedra','btn-papel','btn-tesoura'];
  for (var i = 0; i < btns.length; i++) {
    document.getElementById(btns[i]).disabled = true;
  }
}

function rpsVencedor(a, b) {
  if (a === b) return 'empate';
  if ((a==='pedra'&&b==='tesoura')||(a==='papel'&&b==='pedra')||(a==='tesoura'&&b==='papel')) return 'a';
  return 'b';
}

function novaRodada() {
  rpsEscolha = null;
  rpsRevelado = false;
  dbPatch(sala + '/rps', { escolhaA: null, escolhaB: null });
  renderRPS();
}

function renderRPS() {
  var btns = ['btn-pedra','btn-papel','btn-tesoura'];
  var opcoes = ['pedra','papel','tesoura'];
  for (var i = 0; i < btns.length; i++) {
    var el = document.getElementById(btns[i]);
    el.disabled = !!rpsEscolha;
    el.className = (rpsEscolha === opcoes[i]) ? 'rps-btn chosen' : 'rps-btn';
  }
  document.getElementById('rps-result').className = 'rps-result hidden';
  document.getElementById('btn-nova-rodada').className = 'nova-rodada-btn hidden';
  document.getElementById('rps-waiting').innerHTML = rpsEscolha ? 'aguardando oponente...' : '';
}

// ═══════════════════════════════════════════════════════════════════
// DADOS
// ═══════════════════════════════════════════════════════════════════
var FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
var dadosScoreEu = 0;
var dadosScoreOp = 0;
var dadosRolou = false;
var dadosPollingTimer = null;

function iniciarDados() {
  dadosRolou = false;
  dadosScoreEu = 0; dadosScoreOp = 0;
  document.getElementById('dado-eu').innerHTML = '⚀';
  document.getElementById('dados-score-eu').innerHTML = '0';
  document.getElementById('dados-score-op').innerHTML = '0';
  document.getElementById('dados-result').className = 'rps-result hidden';
  document.getElementById('btn-nova-rodada-dados').className = 'nova-rodada-btn hidden';
  document.getElementById('dados-waiting').innerHTML = '';
  document.getElementById('btn-rolar').disabled = false;
  dbPatch(sala + '/dados', { valorA: null, valorB: null });
  if (dadosPollingTimer) clearInterval(dadosPollingTimer);
  dadosPollingTimer = setInterval(pollDados, 1200);
}

function dadosRolar() {
  if (dadosRolou) return;
  dadosRolou = true;
  document.getElementById('btn-rolar').disabled = true;

  // animação rápida
  var frames = 0;
  var anim = setInterval(function() {
    document.getElementById('dado-eu').innerHTML = FACES[Math.floor(Math.random() * 6)];
    if (++frames >= 8) {
      clearInterval(anim);
      var valor = Math.floor(Math.random() * 6) + 1;
      document.getElementById('dado-eu').innerHTML = FACES[valor - 1];
      var chave = papel === 'a' ? 'valorA' : 'valorB';
      var patch = {};
      patch[chave] = valor;
      dbPatch(sala + '/dados', patch);
      document.getElementById('dados-waiting').innerHTML = 'aguardando oponente...';
    }
  }, 80);
}

function pollDados() {
  dbGet(sala + '/dados', function(data) {
    if (!data) return;
    var va = data.valorA || null;
    var vb = data.valorB || null;
    if (va && vb) {
      clearInterval(dadosPollingTimer);
      revelarDados(va, vb);
    }
  });
}

function revelarDados(va, vb) {
  var meuValor = papel === 'a' ? va : vb;
  var opValor  = papel === 'a' ? vb : va;

  var ganhei = meuValor > opValor;
  var empate = meuValor === opValor;

  if (ganhei) dadosScoreEu++;
  else if (!empate) dadosScoreOp++;

  document.getElementById('dados-score-eu').innerHTML = dadosScoreEu;
  document.getElementById('dados-score-op').innerHTML = dadosScoreOp;
  document.getElementById('dado-eu').innerHTML = FACES[meuValor - 1];

  var res = document.getElementById('dados-result');
  res.className = 'rps-result';
  document.getElementById('dados-result-text').innerHTML = empate ? 'empate!' : (ganhei ? 'você ganhou!' : 'você perdeu!');
  document.getElementById('dados-choices-display').innerHTML = 'você: ' + meuValor + '  oponente: ' + opValor;

  document.getElementById('dados-waiting').innerHTML = '';
  document.getElementById('btn-nova-rodada-dados').className = 'nova-rodada-btn';

// ═══════════════════════════════════════════════════════════════════
// BURACO
// ═══════════════════════════════════════════════════════════════════
var BRC_RANKS = ['A','2','3','4','5','6','7','8','9','T','J','Q','K'];
var BRC_SUITS = ['S','H','D','C'];
var BRC_SYM = {
  S:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#7a8a96" stroke="#7a8a96" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18v4"/><path d="M2 14.499a5.5 5.5 0 0 0 9.591 3.675.6.6 0 0 1 .818.001A5.5 5.5 0 0 0 22 14.5c0-2.29-1.5-4-3-5.5l-5.492-5.312a2 2 0 0 0-3-.02L5 8.999c-1.5 1.5-3 3.2-3 5.5"/></svg>',
  H:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#d98a8a" stroke="#d98a8a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg>',
  D:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#d98a8a" stroke="#d98a8a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.7 10.3a2.41 2.41 0 0 0 0 3.41l7.59 7.59a2.41 2.41 0 0 0 3.41 0l7.59-7.59a2.41 2.41 0 0 0 0-3.41l-7.59-7.59a2.41 2.41 0 0 0-3.41 0Z"/></svg>',
  C:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#7a8a96" stroke="#7a8a96" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.28 9.05a5.5 5.5 0 1 0-10.56 0A5.5 5.5 0 1 0 12 17.66a5.5 5.5 0 1 0 5.28-8.6Z"/><path d="M12 17.66L12 22"/></svg>'
};
var BRC_ORD   = {'3':1,'4':2,'5':3,'6':4,'7':5,'8':6,'9':7,'T':8,'J':9,'Q':10,'K':11,'A':12};
var BRC_VAL   = {'A':15,'2':20,'3':5,'4':5,'5':5,'6':5,'7':5,'8':10,'9':10,'T':10,'J':10,'Q':10,'K':10,'JO':30};

var brcEst = null;
var brcSel = [];
var brcMeldSel = null;
var brcPollTimer = null;
var brcLastV = -1;
var brcNewCardId = null;

// ── Touch system ──────────────────────────────────────────────────
// ── Unified drag/touch/mouse system ───────────────────────────────
var _brcSX = 0, _brcSY = 0;
var _brcMode = null;   // null | 'tap' | 'scroll' | 'drag' | 'reorder'
var _brcId = null, _brcEl = null;
var _brcDragIds = [];
var _brcGhost = null, _brcGOffX = 0, _brcGOffY = 0;
var _brcLongTimer = null;
var _brcLastTouch = 0; // bloqueia mousedown sintético pós-touch
var _brcReorderIdx = -1;
var _brcReorderLandId = null;

function _brcBegin(x, y, id, el) {
  _brcSX = x; _brcSY = y;
  _brcId = id; _brcEl = el;
  _brcMode = 'tap';
  // Long-press só em cartas não selecionadas (reorder); selecionadas vão direto ao drag
  if (brcSel.indexOf(id) < 0) {
    _brcLongTimer = setTimeout(function() {
      if (_brcMode === 'tap') {
        _brcMode = 'reorder';
        _brcMkGhost(el, [id], x, y);
        var maoEl = document.getElementById('brc-mao');
        if (maoEl) maoEl.className += ' reordering';
        _brcReorderHint(x, y);
        if (navigator.vibrate) navigator.vibrate(30);
      }
    }, 320);
  }
}

function _brcCancelLong() {
  if (_brcLongTimer) { clearTimeout(_brcLongTimer); _brcLongTimer = null; }
}

function _brcStep(x, y) {
  if (!_brcMode) return false;
  var dx = x - _brcSX, dy = y - _brcSY;
  var adx = dx < 0 ? -dx : dx, ady = dy < 0 ? -dy : dy;
  if (_brcMode === 'tap') {
    if (adx < 5 && ady < 5) return false;
    _brcCancelLong();
    var isSelected = brcSel.indexOf(_brcId) >= 0;
    // Carta selecionada: vai direto ao drag, sem detecção de scroll
    if (!isSelected && adx >= ady * 1.5) { _brcMode = 'scroll'; return false; }
    _brcMode = 'drag';
    var ids = isSelected ? brcSel.slice() : [_brcId];
    _brcMkGhost(_brcEl, ids, x, y);
  }
  if (_brcMode === 'reorder') {
    _brcGhostXY(x, y);
    _brcReorderHint(x, y);
    _brcEdgeScroll(x, y);
    return true;
  }
  if (_brcMode === 'drag') {
    _brcGhostXY(x, y);
    _brcHint(x, y);
    _brcEdgeScroll(x, y);
    return true;
  }
  return false;
}

function _brcEdgeScroll(cx, cy) {
  var maoEl = document.getElementById('brc-mao');
  if (!maoEl) return;
  var r = maoEl.getBoundingClientRect();
  var isLand = window.innerHeight < 500 && window.innerWidth > window.innerHeight;
  var zone = 72; // px da borda que ativa o scroll
  var maxSpd = 12;
  if (isLand) {
    var ft = cy - r.top, fb = r.bottom - cy;
    if (ft >= 0 && ft < zone) maoEl.scrollTop -= (zone - ft) / zone * maxSpd;
    else if (fb >= 0 && fb < zone) maoEl.scrollTop += (zone - fb) / zone * maxSpd;
  } else {
    var fl = cx - r.left, fr = r.right - cx;
    if (fl >= 0 && fl < zone) maoEl.scrollLeft -= (zone - fl) / zone * maxSpd;
    else if (fr >= 0 && fr < zone) maoEl.scrollLeft += (zone - fr) / zone * maxSpd;
  }
}

function _brcFinish(x, y) {
  _brcCancelLong();
  var dy = y - _brcSY;
  var mode = _brcMode;
  _brcMode = null;
  _brcKillGhost();
  _brcClearHint();
  _brcClearReorderHint();
  if (mode === 'tap') { brcTogCard(_brcId); }
  else if (mode === 'drag') { _brcDrop(x, y, dy); }
  else if (mode === 'reorder') { snd('reorder'); _brcReorderCommit(_brcId); }
}

// Touch handlers
function brcCardTS(e, id) {
  if (e.touches.length >= 2) { _brcMode = null; return; }
  _brcLastTouch = Date.now();
  var t = e.touches[0];
  _brcBegin(t.clientX, t.clientY, id, e.currentTarget);
}
function brcCardTM(e, id) {
  if (!_brcMode || _brcMode === 'scroll') return;
  var t = e.touches[0];
  if (_brcStep(t.clientX, t.clientY)) e.preventDefault();
}
function brcCardTE(e, id) {
  _brcLastTouch = Date.now(); // renova guard — mousedown sintético vem após touchend
  var t = e.changedTouches[0];
  _brcFinish(t.clientX, t.clientY);
}

// Mouse handlers
function brcCardMD(e, id) {
  if (e.button !== 0) return;
  if (Date.now() - _brcLastTouch < 600) return; // ignora sintético pós-touch
  e.preventDefault();
  _brcBegin(e.clientX, e.clientY, id, e.currentTarget);
  document.addEventListener('mousemove', _brcDocMM);
  document.addEventListener('mouseup', _brcDocMU);
}
var _brcDocMM = function(e) { _brcStep(e.clientX, e.clientY); };
var _brcDocMU = function(e) {
  document.removeEventListener('mousemove', _brcDocMM);
  document.removeEventListener('mouseup', _brcDocMU);
  _brcFinish(e.clientX, e.clientY);
};

// Ghost
function _brcMkGhost(el, ids, cx, cy) {
  _brcKillGhost();
  _brcDragIds = ids;
  if (!el) return;
  var rect = el.getBoundingClientRect();
  var g = document.createElement('div');
  g.id = 'brc-ghost';
  g.innerHTML = el.innerHTML;
  g.style.width  = rect.width  + 'px';
  g.style.height = rect.height + 'px';
  g.style.left   = rect.left   + 'px';
  g.style.top    = rect.top    + 'px';
  document.body.appendChild(g);
  _brcGhost = g;
  _brcGOffX = cx - rect.left;
  _brcGOffY = cy - rect.top;
  if (ids.length > 1) {
    var b = document.createElement('div');
    b.style.cssText = 'position:absolute;top:-7px;right:-7px;width:20px;height:20px;background:#2a2a2a;color:#f4ede4;border-radius:50%;font-size:11px;line-height:20px;text-align:center;font-family:Courier New,monospace;font-weight:700;';
    b.innerHTML = ids.length;
    g.appendChild(b);
  }
  if (el) el.className += ' dragging';
}
function _brcGhostXY(cx, cy) {
  if (!_brcGhost) return;
  _brcGhost.style.left = (cx - _brcGOffX) + 'px';
  _brcGhost.style.top  = (cy - _brcGOffY) + 'px';
}
function _brcKillGhost() {
  if (_brcEl) _brcEl.className = _brcEl.className.replace(' dragging', '');
  var g = document.getElementById('brc-ghost');
  if (g && g.parentNode) g.parentNode.removeChild(g);
  _brcGhost = null;
}

// Drop zones
function _brcHint(cx, cy) {
  var el = document.getElementById('brc-disc-area');
  if (!el) return;
  var r = el.getBoundingClientRect();
  el.className = (cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom) ? 'brc-disc-area drop-over' : 'brc-disc-area';
}
function _brcClearHint() {
  var el = document.getElementById('brc-disc-area');
  if (el) el.className = 'brc-disc-area';
}
// Reorder helpers
function _brcReorderHint(cx, cy) {
  var maoEl = document.getElementById('brc-mao');
  if (!maoEl) return;
  var cards = maoEl.getElementsByClassName('brc-card');
  var isLand = window.innerHeight < 500 && window.innerWidth > window.innerHeight;
  var target = cards.length;
  for (var i = 0; i < cards.length; i++) {
    var r = cards[i].getBoundingClientRect();
    var mid = isLand ? (r.top + r.height/2) : (r.left + r.width/2);
    var pos = isLand ? cy : cx;
    if (pos < mid) { target = i; break; }
  }
  _brcReorderIdx = target;
  // Abre gap: empurra cartas após o ponto de inserção
  var shift = isLand ? 72 : 72; // altura ou largura da carta + gap
  for (var j = 0; j < cards.length; j++) {
    if (cards[j].className.indexOf('dragging') >= 0) {
      cards[j].style.webkitTransform = '';
      cards[j].style.transform = '';
      continue;
    }
    var offset = j >= target ? shift : 0;
    if (isLand) {
      cards[j].style.webkitTransform = 'translateY(' + offset + 'px)';
      cards[j].style.transform = 'translateY(' + offset + 'px)';
    } else {
      cards[j].style.webkitTransform = 'translateX(' + offset + 'px)';
      cards[j].style.transform = 'translateX(' + offset + 'px)';
    }
  }
}
function _brcClearReorderHint() {
  var maoEl = document.getElementById('brc-mao');
  if (!maoEl) return;
  maoEl.className = maoEl.className.replace(' reordering', '');
  var cards = maoEl.getElementsByClassName('brc-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].style.webkitTransform = '';
    cards[i].style.transform = '';
  }
}
function _brcReorderCommit(id) {
  var mao = (papel==='a'?brcEst.maoA:brcEst.maoB)||[];
  var card = null, rest = [];
  for (var i = 0; i < mao.length; i++) {
    if (mao[i].id === id) card = mao[i]; else rest.push(mao[i]);
  }
  if (!card) { brcRenderMao(mao); return; }
  var ins = _brcReorderIdx;
  if (ins > rest.length) ins = rest.length;
  if (ins < 0) ins = 0;
  rest.splice(ins, 0, card);
  if (papel==='a') brcEst.maoA=rest; else brcEst.maoB=rest;
  _brcReorderLandId = id;
  brcRenderMao(rest);
}
function _brcDrop(cx, cy, dy) {
  var est = brcEst;
  if (!est || est.turno !== papel || est.fase !== 'jogar') { brcRender(brcEst); return; }
  var ids = _brcDragIds;
  var discEl = document.getElementById('brc-disc-area');
  if (discEl) {
    var r = discEl.getBoundingClientRect();
    if (cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom) {
      if (ids.length === 1) { brcDescartarById(ids[0]); return; }
    }
  }
  if (dy < -50) {
    if (ids.length === 1) { brcDescartarById(ids[0]); return; }
    if (brcMeldSel !== null) { brcBaixar(); return; }
    if (ids.length >= 3) {
      var mao = (papel==='a'?est.maoA:est.maoB)||[];
      var sel = [];
      for (var i=0; i<mao.length; i++) {
        if (ids.indexOf(mao[i].id) >= 0) sel.push(mao[i]);
      }
      if (brcValMeld(sel)) { brcBaixar(); return; }
      toast('baixa inválida');
    }
  }
  brcRender(brcEst);
}

function brcBaralho() {
  var cards = [], id = 0;
  for (var d = 0; d < 2; d++) {
    for (var r = 0; r < BRC_RANKS.length; r++) {
      for (var s = 0; s < BRC_SUITS.length; s++) {
        cards.push({id:id++, rank:BRC_RANKS[r], suit:BRC_SUITS[s]});
      }
    }
    cards.push({id:id++, rank:'JO', suit:''});
    cards.push({id:id++, rank:'JO', suit:''});
  }
  return cards;
}

function brcEmb(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

function brcWild(c) { return c.rank==='JO'||c.rank==='2'; }
function brcRed(c)  { return c.suit==='H'||c.suit==='D'; }

function brcValRank(cards) {
  var nat=[], w=0;
  for (var i=0;i<cards.length;i++) { if(brcWild(cards[i])) w++; else nat.push(cards[i]); }
  if (nat.length < 2) return false; // precisa de ao menos 2 cartas naturais
  if (nat[0].rank==='2') return false;
  var r0=nat[0].rank;
  for (var i=1;i<nat.length;i++) { if(nat[i].rank!==r0) return false; }
  return w < nat.length; // curingas devem ser MENOS que naturais
}

function brcValSeq(cards) {
  var nat=[], w=0;
  for (var i=0;i<cards.length;i++) { if(brcWild(cards[i])) w++; else nat.push(cards[i]); }
  if (nat.length < 2) return false; // precisa de ao menos 2 cartas naturais
  if (w >= nat.length) return false; // curingas devem ser MENOS que naturais
  var s0=nat[0].suit;
  if (!s0) return false;
  for (var i=0;i<nat.length;i++) {
    if (nat[i].suit!==s0) return false;
    if (!BRC_ORD[nat[i].rank]) return false;
  }
  nat.sort(function(a,b){ return BRC_ORD[a.rank]-BRC_ORD[b.rank]; });
  var wl=w;
  for (var i=1;i<nat.length;i++) {
    var gap=BRC_ORD[nat[i].rank]-BRC_ORD[nat[i-1].rank]-1;
    if (gap<0) return false;
    wl-=gap;
    if (wl<0) return false;
  }
  return true;
}

function brcValMeld(c) { return c&&c.length>=3&&(brcValRank(c)||brcValSeq(c)); }

function brcIsCan(m) { return m.length>=7; }
function brcIsLimpa(m) {
  if (!brcIsCan(m)) return false;
  for (var i=0;i<m.length;i++) { if(brcWild(m[i])) return false; }
  return true;
}

function brcMeldPts(m) {
  var p=0;
  for (var i=0;i<m.length;i++) p+=(BRC_VAL[m[i].rank]||5);
  if (brcIsLimpa(m)) p+=200; else if (brcIsCan(m)) p+=100;
  return p;
}

function brcHandPen(h) {
  var p=0; for (var i=0;i<h.length;i++) p+=(BRC_VAL[h[i].rank]||5); return p;
}

function brcClone(o) { return JSON.parse(JSON.stringify(o)); }

// ── Init ──────────────────────────────────────────────────────────
function iniciarBuraco() {
  brcSel=[]; brcMeldSel=null; brcEst=null; brcLastV=-1;
  if (brcPollTimer) clearInterval(brcPollTimer);
  // Mostra botão de ajuda
  var hb = document.getElementById('brc-help-btn');
  if (hb) hb.className = 'brc-help-btn';
  // Tutorial na primeira vez
  brcTutStep = 0;
  try {
    if (!localStorage.getItem('brc_tutok')) {
      setTimeout(brcTutShow, 800);
    }
  } catch(x) {}

  if (papel==='a') {
    var deck=brcEmb(brcBaralho());
    var est={
      v:Date.now(),
      maoA:deck.splice(0,11), maoB:deck.splice(0,11),
      stock:deck, descarte:[],
      mortoA:deck.splice(0,11), mortoB:deck.splice(0,11),
      canastrasA:[], canastrasB:[],
      turno:'a', fase:'comprar',
      mortoUsadoA:false, mortoUsadoB:false, fim:null
    };
    // Fix: mortos were spliced from already-spliced deck — redo properly
    var d2=brcEmb(brcBaralho());
    var mA=d2.splice(0,11), mB=d2.splice(0,11);
    var moA=d2.splice(0,11), moB=d2.splice(0,11);
    est={v:Date.now(),maoA:mA,maoB:mB,stock:d2,descarte:[],mortoA:moA,mortoB:moB,canastrasA:[],canastrasB:[],turno:'a',fase:'comprar',mortoUsadoA:false,mortoUsadoB:false,fim:null};
    brcEst=est;
    brcSave(est, function(){ brcRender(est); brcStartPoll(); });
  } else {
    brcSetStatus('aguardando baralho...');
    brcStartPoll();
  }
}

function brcSave(est,cb) { dbPut(sala+'/buraco', est, cb||function(){}); }

function brcNorm(d) {
  if (!d) return d;
  var arrs=['maoA','maoB','stock','descarte','mortoA','mortoB','canastrasA','canastrasB'];
  for (var i=0;i<arrs.length;i++) { if (!d[arrs[i]]) d[arrs[i]]=[]; }
  return d;
}

function brcStartPoll() {
  if (brcPollTimer) clearInterval(brcPollTimer);
  brcPollTimer=setInterval(function(){
    dbGet(sala+'/buraco', function(data){
      if (!data||data.v===brcLastV) return;
      brcNorm(data);
      brcLastV=data.v; brcEst=data; brcRender(data);
    });
  }, 1400);
}

// ── Render ────────────────────────────────────────────────────────
function brcRender(est) {
  if (!est) return;
  var mao   = papel==='a'?est.maoA:est.maoB;
  var opMao = papel==='a'?est.maoB:est.maoA;
  var meus  = papel==='a'?est.canastrasA:est.canastrasB;
  var opM   = papel==='a'?est.canastrasB:est.canastrasA;
  var mortoU= papel==='a'?est.mortoUsadoA:est.mortoUsadoB;
  var morto = papel==='a'?est.mortoA:est.mortoB;
  var mVez  = est.turno===papel;
  var el;

  el=document.getElementById('brc-op-cards');   if(el) el.innerHTML='🂠 '+((opMao||[]).length);
  el=document.getElementById('brc-op-melds');   if(el) el.innerHTML='baixas: '+((opM||[]).length);
  el=document.getElementById('brc-turno-label');if(el) el.innerHTML=mVez?'sua vez':'vez do oponente';
  el=document.getElementById('brc-stock-count');if(el) el.innerHTML=(est.stock||[]).length;

  el=document.getElementById('brc-disc-top');
  if(el){ var d=est.descarte||[]; el.innerHTML=d.length?brcCEl(d[d.length-1],'dc'):''; }

  el=document.getElementById('brc-melds-op'); if(el) el.innerHTML=brcMeldsHtml(opM||[],false);
  el=document.getElementById('brc-melds-eu'); if(el) el.innerHTML=brcMeldsHtml(meus||[],true);

  brcRenderMao(mao||[]);

  el=document.getElementById('brc-stock-btn'); if(el) el.disabled=!mVez||est.fase!=='comprar';

  if (est.fim) {
    var fEl=document.getElementById('brc-fim');
    if(fEl) fEl.className='brc-fim';
    el=document.getElementById('brc-fim-text');
    if(el){
      var mp=papel==='a'?est.fim.pontoA:est.fim.pontoB;
      var op=papel==='a'?est.fim.pontoB:est.fim.pontoA;
      var tx=mp>op?'você ganhou!':(mp<op?'você perdeu!':'empate!');
      if (_sfxLastTurno !== 'fim') { snd(mp>op?'win':'lose'); _sfxLastTurno='fim'; }
      el.innerHTML='<div class="brc-fim-title">'+tx+'</div>'+
        '<div class="brc-fim-score">você: '+mp+' pts<br>oponente: '+op+' pts</div>';
    }
    return;
  }
  // Notifica quando começa sua vez
  var turnoKey = est.turno + est.fase + (est.v||0);
  if (mVez && est.fase==='comprar' && _sfxLastTurno !== turnoKey) { snd('turn'); }
  _sfxLastTurno = turnoKey;

  // Auto pegar morto se mão vazia na fase jogar
  if (!mortoU&&(mao||[]).length===0&&est.fase==='jogar') { brcPegarMorto(est); return; }

  var msg='';
  if (!mVez) {
    msg = 'vez do oponente';
  } else if (est.fase==='comprar') {
    msg = 'toque no monte ou no descarte';
  } else if (brcMeldSel!==null) {
    msg = brcSel.length ? 'arraste para cima para adicionar' : 'selecione cartas para adicionar';
  } else if (brcSel.length===0) {
    msg = 'toque para selecionar  •  arraste para descartar';
  } else if (brcSel.length===1) {
    msg = 'arraste para descartar  •  selecione mais para baixar';
  } else if (brcSel.length>=3) {
    var maoChk=(papel==='a'?est.maoA:est.maoB)||[];
    var selChk=[];
    for (var si=0;si<maoChk.length;si++) { if(brcSel.indexOf(maoChk[si].id)>=0) selChk.push(maoChk[si]); }
    msg = brcValMeld(selChk) ? 'arraste para cima para baixar' : 'combinação inválida';
  } else {
    msg = brcSel.length + ' cartas  •  selecione mais para baixar';
  }
  if (!mortoU && (morto||[]).length > 0) { msg = msg + '  •  morto disponível'; }
  brcSetStatus(msg, mVez);
}

function brcRenderMao(mao) {
  var el=document.getElementById('brc-mao');
  if (!el) return;
  var landId = _brcReorderLandId; _brcReorderLandId = null;
  var h='';
  for (var i=0;i<mao.length;i++) {
    var c=mao[i];
    var sel=brcSel.indexOf(c.id)>=0;
    var novo=(brcNewCardId!==null&&c.id===brcNewCardId);
    var land=(landId!==null&&c.id===landId);
    var r=brcRS(c), s=brcSS(c);
    h+='<div class="brc-card'+brcCC(c)+(sel?' selected':'')+(novo?' novo':'')+(land?' land':'')+'"'+
       ' ontouchstart="brcCardTS(event,'+c.id+')"'+
       ' ontouchmove="brcCardTM(event,'+c.id+')"'+
       ' ontouchend="brcCardTE(event,'+c.id+')"'+
       ' onmousedown="brcCardMD(event,'+c.id+')">' +
       '<span class="brc-c brc-tl">'+r+'</span>'+
       '<span class="brc-suit-c">'+s+'</span>'+
       '<span class="brc-c brc-br">'+r+'</span></div>';
  }
  el.innerHTML=h;
}

function brcMeldsHtml(melds,ismine) {
  var h='';
  for (var m=0;m<melds.length;m++) {
    var meld=melds[m], isSel=ismine&&brcMeldSel===m;
    var isCan=brcIsCan(meld), isLim=brcIsLimpa(meld);
    var cls='brc-meld'+(isSel?' sel-meld':'')+(isLim?' can-limpa':isCan?' can':'');
    h+='<div class="'+cls+'"'+(ismine?' onclick="brcTogMeld('+m+')"':'')+'>';
    for (var c=0;c<meld.length;c++) h+=brcCEl(meld[c],'sm');
    if (isCan) h+='<span class="brc-meld-tag">'+(isLim?'★':'☆')+brcMeldPts(meld)+'</span>';
    h+='</div>';
  }
  return h;
}

function brcCEl(c,cls) {
  var r=brcRS(c), s=brcSS(c);
  return '<div class="brc-card'+(cls?' '+cls:'')+brcCC(c)+'">' +
    '<span class="brc-c brc-tl">'+r+'</span>'+
    '<span class="brc-suit-c">'+s+'</span>'+
    '<span class="brc-c brc-br">'+r+'</span></div>';
}

function brcCC(c) { return (c.rank==='JO'||c.rank==='2')?' wild':brcRed(c)?' red':''; }
function brcRS(c) { return c.rank==='JO'?'★':(c.rank==='T'?'10':c.rank); }
function brcSS(c) { return c.rank==='JO'?'':(BRC_SYM[c.suit]||''); }

function brcSetStatus(msg, vez) {
  var el=document.getElementById('brc-status');
  if (!el) return;
  el.innerHTML=msg;
  if (vez === true)  { el.style.background='rgba(22,120,50,0.92)'; }
  else if (vez === false) { el.style.background='rgba(180,30,30,0.88)'; }
  else { el.style.background='rgba(0,0,0,0.82)'; }
}

// ── Interações ────────────────────────────────────────────────────
function brcTogCard(id) {
  if (!brcEst||brcEst.turno!==papel||brcEst.fase!=='jogar') return;
  var i=brcSel.indexOf(id);
  if (i>=0) brcSel.splice(i,1); else brcSel.push(id);
  snd('tap');
  brcRender(brcEst);
}

function brcTogMeld(idx) {
  brcMeldSel=brcMeldSel===idx?null:idx;
  brcRender(brcEst);
}

// ── Ações ─────────────────────────────────────────────────────────
function brcComprar() {
  var est=brcEst;
  if (!est||est.turno!==papel||est.fase!=='comprar') return;
  if (!est.stock||!est.stock.length) { brcSetStatus('monte vazio!'); return; }
  var ne=brcClone(est);
  var card=ne.stock.pop();
  if (papel==='a') ne.maoA.unshift(card); else ne.maoB.unshift(card);
  ne.fase='jogar'; ne.v=Date.now();
  brcNewCardId=card.id;
  snd('draw');
  brcEst=ne; brcSave(ne); brcRender(ne);
  setTimeout(function(){ brcNewCardId=null; }, 600);
}

function brcDiscClick() {
  if (brcSel.length >= 1 && brcEst && brcEst.turno === papel && brcEst.fase === 'jogar') {
    if (brcSel.length === 1) { brcDescartarById(brcSel[0]); return; }
    toast('selecione 1 carta para descartar');
  } else {
    brcComprarDescarte();
  }
}
function brcComprarDescarte() {
  var est=brcEst;
  if (!est||est.turno!==papel||est.fase!=='comprar') return;
  var disc=est.descarte||[];
  if (!disc.length) { brcSetStatus('descarte vazio'); return; }
  var top=disc[disc.length-1];
  var mao=papel==='a'?est.maoA:est.maoB;
  var meus=papel==='a'?est.canastrasA:est.canastrasB;
  var ok=false;
  for (var m=0;m<meus.length&&!ok;m++) { if(brcValMeld(meus[m].concat([top]))) ok=true; }
  for (var i=0;i<mao.length&&!ok;i++) {
    for (var j=i+1;j<mao.length&&!ok;j++) {
      if (brcValMeld([mao[i],mao[j],top])) ok=true;
    }
  }
  if (!ok) { brcSetStatus('não pode pegar o descarte agora'); return; }
  var ne=brcClone(est);
  var pile=ne.descarte.slice();
  if (papel==='a') { for(var i=0;i<pile.length;i++) ne.maoA.push(pile[i]); }
  else { for(var i=0;i<pile.length;i++) ne.maoB.push(pile[i]); }
  ne.descarte=[]; ne.fase='jogar'; ne.v=Date.now();
  brcNewCardId=pile.length?pile[pile.length-1].id:null;
  snd('draw');
  brcEst=ne; brcSave(ne); brcRender(ne);
  setTimeout(function(){ brcNewCardId=null; },400);
}

// Baixar: forma meld ou adiciona a meld existente
function brcBaixar() {
  var est=brcEst;
  if (!est||est.turno!==papel||est.fase!=='jogar') return;
  var mao=((papel==='a'?est.maoA:est.maoB)||[]).slice();
  var meus=((papel==='a'?est.canastrasA:est.canastrasB)||[]).slice();
  var sel=[], rest=[];
  for (var i=0;i<mao.length;i++) {
    if (brcSel.indexOf(mao[i].id)>=0) sel.push(mao[i]); else rest.push(mao[i]);
  }
  if (brcMeldSel!==null) {
    // Adicionar a meld existente
    if (!sel.length) { toast('selecione cartas para adicionar'); return; }
    if (brcMeldSel>=meus.length) return;
    var ext=meus[brcMeldSel].concat(sel);
    if (!brcValMeld(ext)) { toast('não encaixa nessa baixa'); return; }
    meus[brcMeldSel]=ext;
  } else {
    // Novo meld
    if (sel.length<3) { toast('mínimo 3 cartas'); return; }
    if (!brcValMeld(sel)) { toast('baixa inválida — mesmo número ou sequência do mesmo naipe'); return; }
    meus.push(sel);
  }
  var ne=brcClone(est);
  brcNorm(ne);
  if (papel==='a'){ ne.maoA=rest; ne.canastrasA=meus; }
  else            { ne.maoB=rest; ne.canastrasB=meus; }
  ne.v=Date.now(); brcSel=[]; brcMeldSel=null;
  snd('meld');
  brcEst=ne; brcSave(ne); brcRender(ne);
}

// Descartar: botão explícito — descarta a 1 carta selecionada
function brcDescartar() {
  if (brcSel.length!==1) { toast('selecione 1 carta para descartar'); return; }
  brcDescartarById(brcSel[0]);
}

// Descarta carta por id (usado pelo botão e pelo swipe)
function brcDescartarById(id) {
  var est=brcEst;
  if (!est||est.turno!==papel||est.fase!=='jogar') return;
  var mao=((papel==='a'?est.maoA:est.maoB)||[]).slice();
  var mortoU=papel==='a'?est.mortoUsadoA:est.mortoUsadoB;
  var disc=null, rest=[];
  for (var i=0;i<mao.length;i++) {
    if (mao[i].id===id) disc=mao[i]; else rest.push(mao[i]);
  }
  if (!disc) return;
  snd('discard');
  brcSel=[]; brcMeldSel=null;
  var ne=brcClone(est);
  brcNorm(ne);
  if (papel==='a') ne.maoA=rest; else ne.maoB=rest;
  ne.descarte.push(disc);
  if (!rest.length&&mortoU) { brcFinalizar(ne); return; }
  ne.turno=papel==='a'?'b':'a'; ne.fase='comprar'; ne.v=Date.now();
  brcEst=ne; brcSave(ne); brcRender(ne);
}

function brcPegarMorto(est) {
  var mortoU=papel==='a'?est.mortoUsadoA:est.mortoUsadoB;
  var morto=papel==='a'?est.mortoA:est.mortoB;
  if (mortoU||!morto||!morto.length) return;
  var ne=brcClone(est);
  var mao=papel==='a'?ne.maoA:ne.maoB;
  var m=papel==='a'?ne.mortoA:ne.mortoB;
  for (var i=0;i<m.length;i++) mao.push(m[i]);
  if (papel==='a'){ ne.maoA=mao; ne.mortoA=[]; ne.mortoUsadoA=true; }
  else { ne.maoB=mao; ne.mortoB=[]; ne.mortoUsadoB=true; }
  brcSel=[]; brcMeldSel=null;
  ne.v=Date.now(); brcEst=ne; brcSave(ne); brcRender(ne);
  toast('morto pego! +11 cartas');
}

function brcFinalizar(est) {
  var cA=est.canastrasA||[], cB=est.canastrasB||[];
  var pA=0, pB=0;
  for (var i=0;i<cA.length;i++) pA+=brcMeldPts(cA[i]);
  for (var i=0;i<cB.length;i++) pB+=brcMeldPts(cB[i]);
  pA-=brcHandPen(est.maoA||[]);
  pB-=brcHandPen(est.maoB||[]);
  if (papel==='a') pA+=100; else pB+=100;
  est.fim={pontoA:pA, pontoB:pB}; est.v=Date.now();
  brcEst=est; brcSave(est); brcRender(est);
}

function brcNovaPartida() {
  var fEl=document.getElementById('brc-fim');
  if(fEl) fEl.className='brc-fim hidden';
  brcSel=[]; brcMeldSel=null;
  var hb = document.getElementById('brc-help-btn');
  if (hb) hb.className = 'brc-help-btn hidden';
  if (brcPollTimer){ clearInterval(brcPollTimer); brcPollTimer=null; }
  dbPatch(sala,{jogoAtivo:null});
}

// ═══════════════════════════════════════════════════════════════════
// TUTORIAL
// ═══════════════════════════════════════════════════════════════════
var brcTutStep = 0;
var BRC_TUT = [
  { emoji: '🃏', title: 'Compre uma carta', body: 'Toque no monte (🂠) ou na carta do descarte para começar sua vez.' },
  { emoji: '✋', title: 'Selecione cartas', body: 'Toque nas cartas para selecioná-las. Selecione 3 ou mais do mesmo número ou em sequência.' },
  { emoji: '⬆️', title: 'Baixe na mesa', body: 'Com 3 ou mais cartas selecionadas, arraste para cima para fazer uma baixa.' },
  { emoji: '🗑️', title: 'Descarte para passar', body: 'Selecione 1 carta e arraste para o descarte, ou toque na pilha de descarte.' }
];

function brcTutShow() {
  brcTutStep = 0;
  var el = document.getElementById('brc-tutorial');
  if (el) el.className = '';
  brcTutRender();
}

function brcTutRender() {
  var s = BRC_TUT[brcTutStep];
  var dots = '';
  for (var i = 0; i < BRC_TUT.length; i++) {
    dots += '<div class="tut-dot' + (i === brcTutStep ? ' active' : '') + '"></div>';
  }
  var dotsEl = document.getElementById('tut-dots');
  if (dotsEl) dotsEl.innerHTML = dots;
  var emoji = document.getElementById('tut-emoji');
  if (emoji) emoji.innerHTML = s.emoji;
  var title = document.getElementById('tut-title');
  if (title) title.innerHTML = s.title;
  var body = document.getElementById('tut-body');
  if (body) body.innerHTML = s.body;
  var btn = document.getElementById('tut-btn');
  if (btn) btn.innerHTML = brcTutStep < BRC_TUT.length - 1 ? 'próximo &rarr;' : 'vamos jogar!';
}

function brcTutNext() {
  if (brcTutStep < BRC_TUT.length - 1) {
    brcTutStep++;
    brcTutRender();
  } else {
    var el = document.getElementById('brc-tutorial');
    if (el) el.className = 'hidden';
    try { localStorage.setItem('brc_tutok', '1'); } catch(x) {}
  }
}

// ═══════════════════════════════════════════════════════════════════
// COMPARTILHAR SALA
// ═══════════════════════════════════════════════════════════════════
function compartilharSala() {
  var base = window.location.href.split('?')[0];
  var url = base + '?sala=' + sala;
  if (navigator.share) {
    navigator.share({ title: 'Buraco', text: 'Vamos jogar Buraco! Sala ' + sala, url: url });
  } else {
    var inp = document.getElementById('waiting-share-url');
    inp.type = 'text';
    inp.value = url;
    try {
      inp.select();
      document.execCommand('copy');
      toast('link copiado!');
    } catch(e) {
      toast('link: ' + url);
    }
    inp.type = 'hidden';
  }
}

// ── URL param: auto-entrar na sala se ?sala=XX ────────────────────
(function() {
  var search = window.location.search;
  if (!search) return;
  var m = search.match(/[?&]sala=(\d{2})/);
  if (!m) return;
  var code = m[1];
  // limpa a URL para evitar re-join no refresh
  try { history.replaceState(null, '', window.location.pathname); } catch(e) {}
  // aguarda DOM estar pronto e então entra
  setTimeout(function() {
    var inp = document.getElementById('inp-code');
    if (inp) inp.value = code;
    entrarSala();
  }, 400);
})();

restoreSession();
</script>
